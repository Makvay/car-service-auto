server:
  port: 8086

spring:
  application:
    name: nsi-service

  datasource:
    url: jdbc:postgresql://localhost:5432/car_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: nsi
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: nsi
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    ru.car.api.nsi: DEBUG
    org.hibernate.SQL: DEBUG