server:
  port: 8080

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        # Claim Service
        - id: claim-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/claim/**
        - id: claim-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/claim/v3/api-docs/**

        # Client Service
        - id: client-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/clients/**
        - id: client-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/clients/v3/api-docs/**

        # Master Service
        - id: master-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/masters/**
        - id: master-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/masters/v3/api-docs/**

        # Warehouse Service
        - id: warehouse-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/parts/**
            - Path=/api/v1/inventory/**
            - Path=/api/v1/reservations/**
            - Path=/api/v1/supplies/**
        - id: warehouse-service-docs
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/parts/v3/api-docs/**
            - Path=/api/v1/inventory/v3/api-docs/**
            - Path=/api/v1/reservations/v3/api-docs/**
            - Path=/api/v1/supplies/v3/api-docs/**

        # Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notification/**
        - id: notification-service-docs
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notification/v3/api-docs/**

        # NSI Service
        - id: nsi-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/nsi/**
        - id: nsi-service-docs
          uri: http://localhost:8086
          predicates:
            - Path=/api/nsi/v3/api-docs/**
