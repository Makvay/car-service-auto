server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://host.docker.internal:8180/realms/car-service/protocol/openid-connect/certs}

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: claim-service
          uri: http://${CLAIM_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/claims,/api/v1/claims/**
        - id: client-service
          uri: http://${CLIENT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/clients,/api/v1/clients/**
        - id: master-service
          uri: http://${MASTER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/masters,/api/v1/masters/**
        - id: warehouse-service
          uri: http://${WAREHOUSE_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/parts,/api/v1/parts/**,/api/v1/reservations,/api/v1/reservations/**,/api/v1/inventory,/api/v1/inventory/**,/api/v1/supplies,/api/v1/supplies/**
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/notification,/api/v1/notification/**
        - id: nsi-service
          uri: http://${NSI_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/nsi,/api/v1/nsi/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
