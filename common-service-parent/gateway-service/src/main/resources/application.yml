server:
  port: 8080

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        # Claim Service
        - id: claim-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/claim/**
        - id: claim-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/api/claim/v3/api-docs/**

        # Client Service
        - id: client-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/client/**
        - id: client-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/client/v3/api-docs/**

        # Master Service
        - id: master-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/master/**
        - id: master-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/api/master/v3/api-docs/**

        # Warehouse Service
        - id: warehouse-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/warehouse/**
        - id: warehouse-service-docs
          uri: http://localhost:8084
          predicates:
            - Path=/api/warehouse/v3/api-docs/**

        # Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notification/**
        - id: notification-service-docs
          uri: http://localhost:8085
          predicates:
            - Path=/api/notification/v3/api-docs/**

        # NSI Service
        - id: nsi-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/nsi/**
        - id: nsi-service-docs
          uri: http://localhost:8086
          predicates:
            - Path=/api/nsi/v3/api-docs/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Claim Service
        url: /api/claim/v3/api-docs
      - name: Client Service
        url: /api/client/v3/api-docs
      - name: Master Service
        url: /api/master/v3/api-docs
      - name: Warehouse Service
        url: /api/warehouse/v3/api-docs
      - name: Notification Service
        url: /api/notification/v3/api-docs
      - name: NSI Service
        url: /api/nsi/v3/api-docs
    urls-primary-name: Claim Service
    tags-sorter: alpha
    operations-sorter: alpha