spring:
  application:
    name: claim-service


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method


  # БД
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/car_service_db
    username: postgres
    password: postgres


    # Server конфигурация
    server:
      port: 8080
      servlet:
        context-path: /api
      tomcat:
        connection-timeout: 5000
        max-connections: 10000


