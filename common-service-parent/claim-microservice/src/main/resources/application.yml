server:
  port: 8081

spring:
  application:
    name: claim-service

  datasource:
    url: jdbc:postgresql://localhost:5432/car_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: claim
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: claim
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: claim-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

logging:
  level:
    ru.car.api.claim: DEBUG
    org.hibernate.SQL: DEBUG

services:
  client:
    url: ${CLIENT_SERVICE_URL:http://localhost:8082}
  master:
    url: ${MASTER_SERVICE_URL:http://localhost:8083}
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

notifications:
  kafka:
    enabled: ${CLAIM_NOTIFICATIONS_KAFKA_ENABLED:true}
