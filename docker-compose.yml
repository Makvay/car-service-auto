services:
  postgres:
    image: postgres:15
    container_name: car-postgres
    environment:
      POSTGRES_DB: car_service
      POSTGRES_USER: car_user
      POSTGRES_PASSWORD: car_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: car-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: car-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: car-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: car-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

    ports:
      - "8180:8080"

  gateway:
    image: makvay/gateway:v1
    container_name: car-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CLAIM_SERVICE_HOST: claims
      CLIENT_SERVICE_HOST: clients
      MASTER_SERVICE_HOST: masters
      WAREHOUSE_SERVICE_HOST: warehouse
      NOTIFICATION_SERVICE_HOST: notifications
      NSI_SERVICE_HOST: nsi
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
      REDIS_HOST: redis
    ports:
      - "8090:8080"
    depends_on:
      - postgres
      - redis
      - keycloak

  claims:
    image: makvay/claims:v1
    container_name: car-claims
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
      REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CLAIM_NOTIFICATIONS_KAFKA_ENABLED: ${CLAIM_NOTIFICATIONS_KAFKA_ENABLED:-true}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - keycloak
      - kafka

  clients:
    image: makvay/clients:v1
    container_name: car-clients
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - keycloak

  masters:
    image: makvay/masters:v1
    container_name: car-masters
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - keycloak

  warehouse:
    image: makvay/warehouse:v1
    container_name: car-warehouse
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - keycloak

  notifications:
    image: makvay/notifications:v1
    container_name: car-notifications
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - keycloak
      - kafka

  nsi:
    image: makvay/nsi:v1
    container_name: car-nsi
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8180/realms/car-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: car_pass
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - keycloak

  frontend:
    image: makvay/frontend:v1
    container_name: car-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8090
      REACT_APP_KEYCLOAK_URL: http://localhost:8180
      REACT_APP_KEYCLOAK_REALM: car-service
      REACT_APP_KEYCLOAK_CLIENT: car-service-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
