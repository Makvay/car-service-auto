version: '3.8'

x-db-config: &db-config
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_service
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-car_user}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-car_pass}

x-keycloak-config: &keycloak-config
  KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080/realms/car-service
  KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/car-service/protocol/openid-connect/certs

services:
  postgres:
    image: postgres:15
    container_name: car-postgres
    environment:
      POSTGRES_DB: car_service
      POSTGRES_USER: ${POSTGRES_USER:-car_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-car_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-car_user} -d car_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: car-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: car-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: car-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: car-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_IMPORT: /opt/keycloak/data/import/car-service-realm.json
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/car-service-realm.json:/opt/keycloak/data/import/car-service-realm.json:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile-gateway
    image: makvay/gateway:local
    container_name: car-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
      REDIS_HOST: redis
      CLAIM_SERVICE_HOST: claims
      CLIENT_SERVICE_HOST: clients
      MASTER_SERVICE_HOST: masters
      WAREHOUSE_SERVICE_HOST: warehouse
      NOTIFICATION_SERVICE_HOST: notifications
      NSI_SERVICE_HOST: nsi
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  claims:
    image: makvay/claims:v1
    container_name: car-claims
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
      REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CLAIM_NOTIFICATIONS_KAFKA_ENABLED: ${CLAIM_NOTIFICATIONS_KAFKA_ENABLED:-true}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  clients:
    image: makvay/clients:v1
    container_name: car-clients
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  masters:
    image: makvay/masters:v1
    container_name: car-masters
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  warehouse:
    image: makvay/warehouse:v1
    container_name: car-warehouse
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  notifications:
    image: makvay/notifications:v1
    container_name: car-notifications
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.yandex.ru}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  nsi:
    image: makvay/nsi:v1
    container_name: car-nsi
    environment:
      SPRING_PROFILES_ACTIVE: prod
      <<: *db-config
      <<: *keycloak-config
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    image: makvay/frontend:v1
    container_name: car-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8090}
      REACT_APP_KEYCLOAK_URL: ${REACT_APP_KEYCLOAK_URL:-http://localhost:8180}
      REACT_APP_KEYCLOAK_REALM: car-service
      REACT_APP_KEYCLOAK_CLIENT: car-service-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: car-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: car-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:
  prometheus_data:
  grafana_data: